pipeline_name: vm-quote-pipeline-runner
version: v1
profile: aws_vm
monthly_hours: 730
currency: USD (excl. tax)
competitor_cloud: AWS
pricing_source_note: Azure Retail Prices API + AWS Pricing API (GetProducts)
defaults:
  include_review: false
  extraction_output_name: step_01_extracted.csv
  region_output_name: step_02_region_mapped.csv
  indicators_output_name: step_03_aws_indicators.csv
  azure_mapping_output_name: step_04_azure_mapping.csv
  pricing_output_name: step_05_pricing.csv
  payload_output_name: step_06_quote_payload.json
  quote_output_name: quote_result.xlsx
steps:
  - id: step_01_extract
    script: scripts/extract_excel_inputs.py
  - id: step_02_region_mapping
    script: .github/skills/region-mapping/scripts/region_mapping.py
  - id: step_03_aws_instance_to_config
    script: .github/skills/vm-aws-instance-to-config/scripts/aws_instance_indicators.py
  - id: step_04_config_to_azure_instance
    script: .github/skills/vm-config-to-azure-instance/scripts/vm-config-to-azure-instance.py
  - id: step_05_pricing
    script: .github/skills/vm-pricing-retail-api/scripts/fetch_vm_prices.py
  - id: step_06_build_quote_payload
    script: .github/skills/excel-quote-writer/scripts/build_vm_quote_payload.py
  - id: step_07_write_quote_excel
    script: .github/skills/excel-quote-writer/scripts/write_quote_excel.py
